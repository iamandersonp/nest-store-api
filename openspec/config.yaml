strict_tdd: true
context: |
  nest-store-v2 is a Node.js/TypeScript project.
  Detected markers: package.json, tsconfig.json, npm package manager.
  Package managers: npm.
  Additional evidence: Test-like files detected (18); examples: src/products/application/brand-use-case.service.spec.ts, src/products/application/category-use-case.service.spec.ts, src/products/application/product-use-case.service.spec.ts, src/products/infrastructure/adapters/in/v1/controllers/brands.controller.spec.ts, src/products/infrastructure/adapters/in/v1/controllers/categories.controller.spec.ts.
  Primary test command: npm test.
  Unit tests: Jest (npm test).
  Integration tests: Supertest (npm test).
  E2E tests: Playwright (npm run test:e2e).
rules:
