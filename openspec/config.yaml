strict_tdd: true
context: |
  nest-store-api is a NestJS 11 + TypeScript 5.7 HTTP API that follows Hexagonal Architecture.
  Detected markers: package.json, tsconfig.json, nest-cli.json, Jest test configuration, and versioned Nest controllers.
  Package manager: npm.
  Main quality commands: npm run lint, npm run format.
  Main test commands: npm test (unit/integration) and npm run test:e2e (HTTP e2e with Jest).
  API versioning is URI-based under /v1.
rules:
  proposal:
    require_problem_statement: true
  spec:
    require_acceptance_criteria: true
  design:
    require_tradeoffs: true
  tasks:
    protect_review_workload: true
  apply:
    test_command: 'npm test'
  verify:
    test_command: 'npm test'
testing:
  detected: '2026-06-01'
  runner:
    command: 'npm test'
    framework: 'Jest'
  layers:
    unit: 'Jest'
    integration: 'Jest + Supertest'
    e2e: 'Jest + Supertest'
  commands:
    unit:
      - scope: '.'
        command: 'npm test'
        framework: 'Jest'
    integration:
      - scope: '.'
        command: 'npm test'
        framework: 'Jest + Supertest'
    e2e:
      - scope: '.'
        command: 'npm run test:e2e'
        framework: 'Jest + Supertest'
  coverage:
    command: 'npm run test:cov'
    commands:
      - scope: '.'
        command: 'npm run test:cov'
quality:
  lint: 'npm run lint'
  lint_commands:
    - scope: '.'
      command: 'npm run lint'
      framework: 'ESLint'
  typecheck: ''
  typecheck_commands: []
  format: 'npm run format'
  format_commands:
    - scope: '.'
      command: 'npm run format'
      framework: 'Prettier'
