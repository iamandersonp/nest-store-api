    require_problem_statement: true
  spec:
    require_acceptance_criteria: true
  design:
    require_tradeoffs: true
  tasks:
    protect_review_workload: true
  apply:
    test_command: "npm test"
  verify:
    test_command: "npm test"
testing:
  detected: "2026-05-31"
  runner:
    command: "npm test"
    framework: "Jest"
  layers:
    unit: "Jest"
    integration: "Supertest"
    e2e: "Playwright"
  commands:
    unit:
      - scope: "."
        command: "npm test"
        framework: "Jest"
    integration:
      - scope: "."
        command: "npm test"
        framework: "Supertest"
    e2e:
      - scope: "."
        command: "npm run test:e2e"
        framework: "Playwright"
  coverage:
    command: ""
    commands:
      []
quality:
  lint: "npm run lint"
  lint_commands:
    - scope: "."
      command: "npm run lint"
      framework: "linter"
